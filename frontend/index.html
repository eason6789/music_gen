<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI音乐生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: white;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            font-weight: 600;
        }

        .tab:hover {
            background: #f8f9fa;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input[type="url"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-upload {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .file-upload input {
            display: none;
        }

        .file-upload .icon {
            font-size: 40px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .file-upload .text {
            color: #666;
        }

        .file-upload .file-name {
            color: #333;
            font-weight: 500;
            margin-top: 10px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-item input {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        .audio-player {
            width: 100%;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #5a6fd6;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 16px;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fde8e8;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .char-count {
            text-align: right;
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }

        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
        }

        .preset-voice {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .preset-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: #e0e0e0;
        }

        .preset-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 AI音乐生成器</h1>
            <p>基于 MiniMax Music 2.6 · 让创意化为旋律</p>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="description">📝 描述模式</button>
            <button class="tab" data-tab="lyrics">🎤 歌词模式</button>
            <!-- <button class="tab" data-tab="cover">🎙️ AI翻唱</button> -->
        </div>

        <div class="content">
            <!-- 描述模式 -->
            <div id="description-tab" class="tab-content active">
                <div class="form-group">
                    <label for="description">音乐描述</label>
                    <textarea id="description" placeholder="描述你想要的音乐风格、情绪、场景...&#10;例如：轻松愉快的民谣，适合阳光明媚的下午，吉他伴奏，给人温暖的感觉"></textarea>
                    <div class="char-count"><span id="desc-count">0</span>/<span id="desc-limit">500</span></div>
                </div>
                <div class="form-group">
                    <label>描述长度限制</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="desc-length" value="500" checked>
                            <span>500字</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="desc-length" value="1000">
                            <span>1000字</span>
                        </label>
                    </div>
                    <p class="info-text">纯音乐生成，无需歌词</p>
                </div>
            </div>

            <!-- 歌词模式 -->
            <div id="lyrics-tab" class="tab-content">
                <div class="form-group">
                    <label for="song-name">歌曲名称 <span style="color: #999; font-weight: normal;">(可选)</span></label>
                    <input type="text" id="song-name" placeholder="给歌曲起个名字">
                </div>
                <div class="form-group">
                    <label for="lyrics">歌词 <span style="color: #e74c3c; font-weight: normal;">*必填</span></label>
                    <textarea id="lyrics" placeholder="输入歌词内容，使用换行分隔每行&#10;支持标签：[Verse]、[Chorus]、[Bridge] 等&#10;例如：&#10;[Verse]&#10;阳光穿过窗帘照进房间&#10;新的一天开始了&#10;[Chorus]&#10;快乐的心情无法言喻"></textarea>
                </div>
            </div>

            <!-- AI翻唱模式 (MiniMax API暂不支持, 暂时隐藏) -->
            <!--
            <div id="cover-tab" class="tab-content">
                <div class="form-group">
                    <label>上传原曲音频 <span style="color: #e74c3c; font-weight: normal;">*必填</span></label>
                    <div class="file-upload" id="audio-upload-cover">
                        <input type="file" id="audio-file-cover" accept="audio/*">
                        <div class="icon">🎵</div>
                        <div class="text">点击或拖拽上传音频文件 (MP3/WAV/FLAC)</div>
                        <div class="file-name" id="cover-file-name"></div>
                    </div>
                    <p class="info-text">支持6秒至6分钟的音频，时长最大50MB</p>
                </div>
                <div class="form-group">
                    <label for="cover-style">目标翻唱风格描述 <span style="color: #e74c3c; font-weight: normal;">*必填</span></label>
                    <textarea id="cover-style" placeholder="描述你想要的目标翻唱风格，如：温柔的女声，R&B风格，适合夜晚聆听"></textarea>
                    <p class="info-text">描述目标音色和风格，长度10-300字符</p>
                </div>
                <div class="form-group">
                    <label for="cover-lyrics">自定义歌词 <span style="color: #999; font-weight: normal;">(可选)</span></label>
                    <textarea id="cover-lyrics" placeholder="如果想修改歌词，可以在这里输入新歌词（10-1000字符）&#10;不填则自动从原曲提取"></textarea>
                </div>
            </div>
            -->

            <button id="submit-btn" class="submit-btn">🚀 开始生成</button>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p class="loading-text">音乐生成中，请稍候...</p>
            </div>

            <div id="error" class="error"></div>

            <div id="result" class="result">
                <h3 class="result-title">🎉 生成完成!</h3>
                <audio id="audio-player" class="audio-player" controls></audio>
                <div>
                    <a id="download-btn" class="download-btn" href="#" download="music.mp3">⬇️ 下载音乐</a>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by MiniMax Music 2.6 · 生成的音乐仅供个人学习使用
        </div>
    </div>

    <script>
        // 自动检测API路径: 独立域名用 /api, 子目录部署用 /music/api
        const API_BASE = window.location.pathname.startsWith('/music_gen/') ? '/music/api' : '/api';

        // Tab切换
        let currentTab = 'description';
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const newTab = tab.dataset.tab;
                if (currentTab === newTab) return;

                // 清除其他tab的内容(同一tab保留)
                if (currentTab === 'description') {
                    document.getElementById('description').value = '';
                    document.getElementById('desc-count').textContent = '0';
                } else if (currentTab === 'lyrics') {
                    document.getElementById('song-name').value = '';
                    document.getElementById('lyrics').value = '';
                }

                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(newTab + '-tab').classList.add('active');
                currentTab = newTab;

                // 清除结果显示
                errorEl.classList.remove('show');
                resultEl.classList.remove('show');
            });
        });

        // 描述字数统计
        const descriptionInput = document.getElementById('description');
        const descCount = document.getElementById('desc-count');
        const descLimit = document.getElementById('desc-limit');

        descriptionInput.addEventListener('input', () => {
            descCount.textContent = descriptionInput.value.length;
        });

        // 描述长度限制切换
        document.querySelectorAll('input[name="desc-length"]').forEach(radio => {
            radio.addEventListener('change', () => {
                descLimit.textContent = radio.value;
                if (descriptionInput.value.length > parseInt(radio.value)) {
                    descriptionInput.value = descriptionInput.value.substring(0, parseInt(radio.value));
                    descCount.textContent = descriptionInput.value.length;
                }
            });
        });

        // 翻唱模式文件上传
        const audioUploadCover = document.getElementById('audio-upload-cover');
        const audioFileCover = document.getElementById('audio-file-cover');
        const coverFileName = document.getElementById('cover-file-name');
        let coverAudioData = null;

        audioUploadCover.addEventListener('click', () => audioFileCover.click());
        audioFileCover.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                coverFileName.textContent = file.name;
                // 转换为base64
                const reader = new FileReader();
                reader.onload = (e) => {
                    coverAudioData = e.target.result.split(',')[1]; // 去掉data:image/...前缀
                };
                reader.readAsDataURL(file);
            }
        });

        // 提交按钮
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const resultEl = document.getElementById('result');
        const audioPlayer = document.getElementById('audio-player');
        const downloadBtn = document.getElementById('download-btn');

        submitBtn.addEventListener('click', async () => {
            errorEl.classList.remove('show');
            resultEl.classList.remove('show');

            const activeTab = document.querySelector('.tab.active').dataset.tab;

            if (activeTab === 'description') {
                const description = document.getElementById('description').value.trim();
                const promptLength = document.querySelector('input[name="desc-length"]:checked').value;

                if (!description) {
                    showError('请输入音乐描述');
                    return;
                }

                submitBtn.disabled = true;
                loading.classList.add('show');

                try {
                    const response = await fetch(`${API_BASE}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            mode: 'description',
                            description: description,
                            prompt_length: promptLength
                        })
                    });

                    if (!response.ok && response.status >= 500) {
                        showError(`服务器错误 (${response.status})，请稍后重试`);
                    } else {
                        const data = await parseJSON(response);
                        handleResponse(data);
                    }
                } catch (e) {
                    showError('请求失败: ' + e.message);
                } finally {
                    submitBtn.disabled = false;
                    loading.classList.remove('show');
                }

            } else if (activeTab === 'lyrics') {
                const songName = document.getElementById('song-name').value.trim();
                const lyrics = document.getElementById('lyrics').value.trim();

                if (!lyrics) {
                    showError('请输入歌词');
                    return;
                }

                submitBtn.disabled = true;
                loading.classList.add('show');

                try {
                    const response = await fetch(`${API_BASE}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            mode: 'lyrics',
                            song_name: songName,
                            lyrics: lyrics
                        })
                    });

                    if (!response.ok && response.status >= 500) {
                        showError(`服务器错误 (${response.status})，请稍后重试`);
                    } else {
                        const data = await parseJSON(response);
                        handleResponse(data);
                    }
                } catch (e) {
                    showError('请求失败: ' + e.message);
                } finally {
                    submitBtn.disabled = false;
                    loading.classList.remove('show');
                }

            // AI翻唱暂时隐藏，MiniMax API的cover模型需要未公开的内部参数
            // } else if (activeTab === 'cover') { ... }
        });

        function handleResponse(data) {
            if (data.error) {
                showError(data.error);
            } else if (data.success && data.audio_url) {
                showResult(data.audio_url);
            } else if (data.status === 'processing') {
                showError('音乐正在生成中，请稍后刷新重试');
            } else {
                showError('生成失败，请重试');
            }
        }

        async function parseJSON(response) {
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                throw new Error('服务器返回异常，请稍后重试');
            }
        }

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function showResult(audioUrl) {
            audioPlayer.src = audioUrl;
            downloadBtn.href = audioUrl;
            downloadBtn.download = 'ai_music_' + Date.now() + '.mp3';
            resultEl.classList.add('show');
        }
    </script>
</body>
</html>
